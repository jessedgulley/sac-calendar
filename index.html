<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>St. Mary Catholic School — SAC Meeting Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --royal:    #1A3A8F;
      --royal-dk: #112670;
      --royal-lt: #E8EDF8;
      --accent:   #2E5FBF;
      --cream:    #F7F9FC;
      --stone:    #DDE3EF;
      --text:     #1A1A2E;
      --muted:    #5A6480;
      --special:  #B8420A;
      --spec-lt:  #FBF0EB;
      --white:    #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--royal);
      padding: 0 40px;
      display: flex;
      align-items: center;
      min-height: 76px;
      border-bottom: 4px solid #FFFFFF30;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
    }

    .logo-img {
      height: 50px;
      width: auto;
      display: block;
    }

    .logo-fallback {
      width: 50px;
      height: 50px;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--royal);
      flex-shrink: 0;
    }

    .header-divider {
      width: 1px;
      height: 38px;
      background: rgba(255,255,255,0.3);
    }

    .header-text h1 {
      font-family: 'EB Garamond', serif;
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── LAYOUT ── */
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 30px 24px 60px;
    }

    /* ── NAV ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .cal-nav h2 {
      font-family: 'EB Garamond', serif;
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--royal);
    }

    .nav-btns { display: flex; gap: 8px; }

    .nav-btns button {
      background: var(--royal);
      color: var(--white);
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .nav-btns button:hover { background: var(--accent); }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.73rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-regular { background: var(--royal); }
    .dot-special { background: var(--special); }

    /* ── GRID ── */
    .cal-grid {
      background: var(--white);
      border: 1px solid var(--stone);
      border-radius: 6px;
      overflow: visible;
      box-shadow: 0 2px 10px rgba(26,58,143,0.09);
    }

    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--royal);
      border-radius: 6px 6px 0 0;
      overflow: hidden;
    }

    .day-header {
      padding: 10px 0;
      text-align: center;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    .cal-body {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-cell {
      min-height: 88px;
      border-right: 1px solid var(--stone);
      border-bottom: 1px solid var(--stone);
      padding: 7px 6px 5px;
      position: relative;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.other-month .date-num { color: #bbc4dc; }
    .cal-cell.other-month { background: #f9fafd; }

    .cal-cell.today { background: #EDF1FA; }
    .cal-cell.today .date-num {
      background: var(--royal);
      color: var(--white);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .date-num {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--royal-dk);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    /* ── EVENTS & TOOLTIPS ── */
    .event-wrap { position: relative; }

    .event {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 3px 6px;
      border-radius: 3px;
      margin-bottom: 3px;
      line-height: 1.3;
      cursor: default;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .event-regular {
      background: var(--royal-lt);
      color: var(--royal);
      border-left: 3px solid var(--royal);
    }

    .event-special {
      background: var(--spec-lt);
      color: var(--special);
      border-left: 3px solid var(--special);
    }

    /* Tooltip */
    .tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 200;
      background: var(--royal-dk);
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.45;
      padding: 9px 12px;
      border-radius: 5px;
      white-space: normal;
      min-width: 190px;
      max-width: 250px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    .tooltip::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 12px;
      border-width: 0 5px 5px;
      border-style: solid;
      border-color: transparent transparent var(--royal-dk) transparent;
    }

    .tooltip .tt-type {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 4px;
    }

    .tooltip .tt-title {
      font-weight: 600;
      font-size: 0.76rem;
      margin-bottom: 5px;
      color: var(--white);
    }

    .tooltip .tt-time {
      font-size: 0.67rem;
      color: rgba(255,255,255,0.65);
    }

    .event-wrap:hover .tooltip { display: block; }

    /* Flip tooltip on right-edge columns */
    .cal-cell:nth-child(7n-1) .tooltip,
    .cal-cell:nth-child(7n) .tooltip {
      left: auto;
      right: 0;
    }
    .cal-cell:nth-child(7n-1) .tooltip::before,
    .cal-cell:nth-child(7n) .tooltip::before {
      left: auto;
      right: 12px;
    }

    /* ── UPCOMING ── */
    .upcoming { margin-top: 30px; }

    .upcoming h3 {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--royal);
      border-bottom: 2px solid var(--royal);
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .upcoming-list { display: flex; flex-direction: column; gap: 10px; }

    .upcoming-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--white);
      border: 1px solid var(--stone);
      border-left: 4px solid var(--royal);
      border-radius: 5px;
      padding: 12px 16px;
    }
    .upcoming-item.is-special { border-left-color: var(--special); }

    .upcoming-date { text-align: center; min-width: 42px; }
    .upcoming-date .month {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .upcoming-date .day {
      font-family: 'EB Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      line-height: 1;
      color: var(--royal);
    }

    .upcoming-info { flex: 1; }
    .upcoming-info .title { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .upcoming-info .meta { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }

    .badge {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      margin-top: 5px;
      display: inline-block;
    }
    .badge-regular { background: var(--royal-lt); color: var(--royal); }
    .badge-special { background: var(--spec-lt); color: var(--special); }

    /* ── FOOTER ── */
    footer {
      background: var(--royal-dk);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 16px;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      margin-top: 48px;
    }
    footer a { color: rgba(255,255,255,0.8); text-decoration: none; }
    footer a:hover { color: var(--white); text-decoration: underline; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main { padding: 18px 10px 40px; }
      .cal-cell { min-height: 54px; padding: 4px 2px 2px; }
      .event { display: none; }
      .cal-cell.has-event::after {
        content: '';
        display: block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--royal);
        margin: 2px auto 0;
      }
      .cal-cell.has-special::after { background: var(--special); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img
      class="logo-img"
      src="https://www.stmarysll.org/custom/images/logo.png"
      alt="St. Mary Catholic School"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
    />
    <div class="logo-fallback" style="display:none;">SM</div>
    <div class="header-divider"></div>
    <div class="header-text">
      <h1>School Advisory Council</h1>
      <p>St. Mary Catholic School &mdash; Lake Leelanau, MI</p>
    </div>
  </div>
</header>

<main>
  <div class="cal-nav">
    <h2 id="month-label"></h2>
    <div class="nav-btns">
      <button id="prev-btn" aria-label="Previous month">&#8592;</button>
      <button id="next-btn" aria-label="Next month">&#8594;</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-regular"></div> Regular Meeting</div>
    <div class="legend-item"><div class="legend-dot dot-special"></div> Special Meeting</div>
  </div>

  <div class="cal-grid">
    <div class="day-headers">
      <div class="day-header">Sun</div>
      <div class="day-header">Mon</div>
      <div class="day-header">Tue</div>
      <div class="day-header">Wed</div>
      <div class="day-header">Thu</div>
      <div class="day-header">Fri</div>
      <div class="day-header">Sat</div>
    </div>
    <div class="cal-body" id="cal-body"></div>
  </div>

  <div class="upcoming">
    <h3>Upcoming Meetings</h3>
    <div class="upcoming-list" id="upcoming-list"></div>
  </div>
</main>

<footer>
  St. Mary Catholic School &mdash; School Advisory Council &mdash;
  <a href="https://www.stmarysll.org/about/school-advisory-council.cfm" target="_blank">stmarysll.org</a>
</footer>

<script>
  const MONTHS       = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DAYS         = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  // ── SPECIAL ONE-OFF MEETINGS ─────────────────────────────────
  const specialMeetings = [
    { y: 2025, m: 5, d: 24, label: "Special Session",                                            type: "special", location: "School Cafeteria" },
    { y: 2026, m: 6, d: 15, label: "Special Session: Vision Statement & Strategic Plan Review",  type: "special", location: "TBD (Parish Social Hall pending confirmation)" },
  ];

  // ── 4TH WEDNESDAY REGULAR MEETINGS ──────────────────────────
  function getFourthWednesdays(year) {
    const results = [];
    for (let m = 0; m < 12; m++) {
      let count = 0;
      for (let d = 1; d <= 31; d++) {
        const dt = new Date(year, m, d);
        if (dt.getMonth() !== m) break;
        if (dt.getDay() === 3) {
          count++;
          if (count === 4) { results.push({ y: year, m, d, label: "Regular Meeting", type: "regular", location: "School Cafeteria" }); break; }
        }
      }
    }
    return results;
  }

  const today = new Date();
  const regularMeetings = [
    ...getFourthWednesdays(today.getFullYear() - 1),
    ...getFourthWednesdays(today.getFullYear()),
    ...getFourthWednesdays(today.getFullYear() + 1),
  ];

  function keyOf(y, m, d) { return `${y}-${m}-${d}`; }

  const regularMap = {};
  regularMeetings.forEach(e => { regularMap[keyOf(e.y, e.m, e.d)] = e; });

  const specialMap = {};
  specialMeetings.forEach(e => { specialMap[keyOf(e.y, e.m, e.d)] = e; });

  // ── RENDER ───────────────────────────────────────────────────
  let viewYear  = today.getFullYear();
  let viewMonth = today.getMonth();

  function renderCalendar() {
    document.getElementById("month-label").textContent = `${MONTHS[viewMonth]} ${viewYear}`;

    const body      = document.getElementById("cal-body");
    body.innerHTML  = "";

    const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
    const totalCells  = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement("div");
      cell.className = "cal-cell";

      let d, m, y;
      if (i < firstDay) {
        d = daysInPrev - firstDay + i + 1;
        m = viewMonth - 1; y = viewYear;
        if (m < 0) { m = 11; y--; }
        cell.classList.add("other-month");
      } else if (i >= firstDay + daysInMonth) {
        d = i - firstDay - daysInMonth + 1;
        m = viewMonth + 1; y = viewYear;
        if (m > 11) { m = 0; y++; }
        cell.classList.add("other-month");
      } else {
        d = i - firstDay + 1;
        m = viewMonth; y = viewYear;
      }

      const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
      if (isToday) cell.classList.add("today");

      const numEl = document.createElement("div");
      numEl.className = "date-num";
      numEl.textContent = d;
      cell.appendChild(numEl);

      const key    = keyOf(y, m, d);
      const ev     = specialMap[key] || regularMap[key];

      if (ev) {
        const isSpecial = ev.type === "special";
        cell.classList.add("has-event");
        if (isSpecial) cell.classList.add("has-special");

        const wrap = document.createElement("div");
        wrap.className = "event-wrap";

        const pill = document.createElement("div");
        pill.className = `event ${isSpecial ? "event-special" : "event-regular"}`;
        pill.textContent = isSpecial ? "Special Session" : "Regular Meeting";

        const tip = document.createElement("div");
        tip.className = "tooltip";
        tip.innerHTML = `
          <div class="tt-type">${isSpecial ? "Special Session" : "Regular Meeting"}</div>
          <div class="tt-title">${ev.label}</div>
          <div class="tt-time">${DAYS[new Date(y, m, d).getDay()]}, ${MONTHS[m]} ${d}, ${y} &mdash; 6:30 PM</div>
          <div class="tt-time" style="margin-top:3px;">&#128205; ${ev.location}</div>
        `;

        wrap.appendChild(pill);
        wrap.appendChild(tip);
        cell.appendChild(wrap);
      }

      body.appendChild(cell);
    }

    renderUpcoming();
  }

  function renderUpcoming() {
    const list = document.getElementById("upcoming-list");
    list.innerHTML = "";

    const now = new Date();
    now.setHours(0, 0, 0, 0);

    const allEvents = [
      ...regularMeetings,
      ...specialMeetings,
    ].filter(e => {
      if (e.type === "regular" && specialMap[keyOf(e.y, e.m, e.d)]) return false;
      return new Date(e.y, e.m, e.d) >= now;
    }).sort((a, b) => new Date(a.y, a.m, a.d) - new Date(b.y, b.m, b.d));

    const next5 = allEvents.slice(0, 5);

    if (!next5.length) {
      list.innerHTML = "<p style='color:var(--muted);font-size:.85rem;'>No upcoming meetings found.</p>";
      return;
    }

    next5.forEach(e => {
      const dt      = new Date(e.y, e.m, e.d);
      const dayName = DAYS[dt.getDay()];
      const isSpec  = e.type === "special";

      const item = document.createElement("div");
      item.className = `upcoming-item${isSpec ? " is-special" : ""}`;
      item.innerHTML = `
        <div class="upcoming-date">
          <div class="month">${MONTHS_SHORT[e.m]}</div>
          <div class="day">${e.d}</div>
        </div>
        <div class="upcoming-info">
          <div class="title">${e.label}</div>
          <div class="meta">${dayName}, ${MONTHS[e.m]} ${e.d}, ${e.y} &mdash; 6:30 PM</div>
          <div class="meta" style="margin-top:2px;">&#128205; ${e.location}</div>
          <span class="badge ${isSpec ? "badge-special" : "badge-regular"}">${isSpec ? "Special Session" : "Regular"}</span>
        </div>
      `;
      list.appendChild(item);
    });
  }

  document.getElementById("prev-btn").addEventListener("click", () => {
    if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });

  document.getElementById("next-btn").addEventListener("click", () => {
    if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
